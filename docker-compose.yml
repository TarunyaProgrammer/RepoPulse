version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: repopulse-mongodb
    ports:
      - "27020:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:latest
    container_name: repopulse-redis
    ports:
      - "6390:6379"

volumes:
  mongodb_data:
